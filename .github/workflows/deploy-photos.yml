# Deploy photos app to Cloudflare Pages
name: Deploy photos app

on:
  push:
    branches: [main]
    paths:
      - 'apps/photos/**'
      - 'packages/**'
      - '.github/workflows/deploy-photos.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build photos app
        run: npm run build --workspace=apps/photos
        env:
          PUBLIC_CF_IMAGES_ACCOUNT_HASH: ${{ secrets.PUBLIC_CF_IMAGES_ACCOUNT_HASH }}
          PUBLIC_WORKER_URL: ${{ secrets.PUBLIC_WORKER_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/photos/dist --project-name=portfolio-photos
