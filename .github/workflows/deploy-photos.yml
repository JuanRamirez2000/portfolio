name: Deploy photos app

on:
  push:
    branches: [main]
    paths:
      - 'apps/photos/**'
      - 'packages/**'
      - '.github/workflows/deploy-photos.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build photos app
        run: npm run build --workspace=apps/photos
        env:
          PUBLIC_CF_IMAGES_ACCOUNT_HASH: ${{ secrets.PUBLIC_CF_IMAGES_ACCOUNT_HASH }}

      - name: Deploy to Cloudflare
        run: npx wrangler deploy --config apps/photos/wrangler.jsonc
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
