# Deploy admin app to Cloudflare Pages
name: Deploy admin app

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'apps/admin/**'
      - '.github/workflows/deploy-admin.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build admin app
        run: npm run build --workspace=apps/admin
        env:
          VITE_WORKER_URL: ${{ secrets.PUBLIC_WORKER_URL }}
          VITE_CF_ACCOUNT_HASH: ${{ secrets.PUBLIC_CF_IMAGES_ACCOUNT_HASH }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/admin/dist --project-name=portfolio-admin
